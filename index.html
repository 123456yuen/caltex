<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caltex 快速計算機</title>
    <style>
        :root { --caltex-red: #d1121d; }
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #ececec; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 100%; max-width: 400px; }
        h2 { color: var(--caltex-red); text-align: center; margin: 0 0 20px 0; }
        
        .price-box { background: #f4f4f4; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 20px; border-left: 5px solid var(--caltex-red); }
        .update-time { font-size: 0.75em; color: #888; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .select-btn { flex: 1; padding: 15px; border: none; border-radius: 6px; background: #333; color: white; font-weight: bold; cursor: pointer; }
        .select-btn:hover { background: var(--caltex-red); }
        
        .result-box { background: #fff5f5; padding: 20px; border-radius: 8px; border: 1px solid #ffcccc; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .final-price { font-size: 1.8em; font-weight: bold; color: var(--caltex-red); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Caltex 快速計算</h2>
    
    <div class="price-box">
        <div id="official-price" style="font-weight: bold;">白金牌價: 讀取中...</div>
        <div id="last-updated" class="update-time">更新時間: --</div>
    </div>

    <div class="btn-group">
        <button class="select-btn" onclick="calculate(350, 50)">門市 $350</button>
        <button class="select-btn" onclick="calculate(700, 100)">門市 $700</button>
    </div>

    <div class="result-box" id="result-area" style="display: none;">
        <div class="result-row"><span>紅卡優惠:</span> <span id="r-disc">--</span></div>
        <div class="result-row"><span>總入油量:</span> <span id="r-liters">--</span></div>
        <div class="result-row"><span>優惠券:</span> <span id="r-coupon">--</span></div>
        <div class="final-price" id="final-price">HK$ --</div>
        <div style="text-align: center; font-size: 0.85em; font-weight: bold; color: var(--caltex-red); margin-top: 5px;" id="r-unit">--</div>
    </div>
</div>

<script>
    let currentPrice = 0;

    function calculate(total, coupon) {
        const price = currentPrice;
        
        // 1. 總入油量 (基於門市總數)
        const totalLiters = total / price;
        
        // 2. 扣除優惠券後的淨金額
        const netSpend = total - coupon;
        
        // 3. 可享紅卡優惠的公升數
        const discountableLiters = netSpend / price;
        
        // 4. 紅卡優惠金額
        const cardDiscount = discountableLiters * 12;
        
        // 5. 實付金額
        const final = netSpend - cardDiscount;
        
        // 顯示結果
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('r-disc').innerText = '-$' + cardDiscount.toFixed(3);
        document.getElementById('r-liters').innerText = totalLiters.toFixed(3) + ' L';
        document.getElementById('r-coupon').innerText = '-$' + coupon.toFixed(0);
        document.getElementById('final-price').innerText = '實付: HK$ ' + final.toFixed(3);
        document.getElementById('r-unit').innerText = '實付每公升: $' + (final/totalLiters).toFixed(3);
    }

    window.onload = function() {
        fetch('prices.json')
            .then(response => response.json())
            .then(data => {
                currentPrice = data.platinum;
                document.getElementById('official-price').innerText = '白金牌價: HK$ ' + currentPrice;
                document.getElementById('last-updated').innerText = '最後更新: ' + data.last_updated;
            });
    };
</script>

</body>
</html>
