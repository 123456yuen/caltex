<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加德士紅卡計算器</title>
  <style>
    body {font-family: -apple-system, sans-serif; margin:0; padding:20px; background:#f4f4f4;}
    .container {max-width:700px; margin:auto; background:white; padding:25px; border-radius:20px; box-shadow:0 8px 30px rgba(0,0,0,0.1);}
    h1 {text-align:center; color:#c8102e;}
    .status {text-align:center; padding:12px; margin:10px 0; border-radius:12px; background:#e8f5e9; color:#2e7d32;}
    label {display:block; margin:15px 0 5px; font-weight:bold;}
    input, select {width:100%; padding:14px; margin:8px 0; border-radius:12px; border:1px solid #ddd;}
    button {width:100%; padding:16px; margin:8px 0; border:none; border-radius:12px; font-size:1.05rem; font-weight:bold;}
    .btn-update {background:#007bff; color:white;}
    .btn-calc {background:#c8102e; color:white;}
    .result {margin-top:20px; padding:25px; background:#f0f8ff; border-radius:16px;}
    .highlight {font-size:2.1rem; color:#c8102e; font-weight:bold;}
  </style>
</head>
<body>
<div class="container">
  <h1>🚗 加德士紅卡計算器</h1>
  <div class="status" id="status">準備就緒</div>

  <button class="btn-update" onclick="updatePrice()">🔄 更新最新油價</button>

  <label>白金汽油 ($/L)</label>
  <input type="number" id="plat" value="33.64" step="0.01" oninput="calc()">

  <label>入油量 (公升)</label>
  <input type="number" id="litres" value="50" step="1" oninput="calc()">

  <label>卡類型</label>
  <select id="card" onchange="calc()">
    <option value="fun">加FUN咭</option>
    <option value="red" selected>私人能源咭 / 紅卡</option>
  </select>

  <button class="btn-calc" onclick="calc()">正常計算</button>
  <button onclick="calcSunday()">星期日油券 (滿$350減$50)</button>

  <div class="result" id="result"></div>
</div>
