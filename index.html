<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>加德士汽油計算機</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { padding: 10px; background: #e74c3c; color: white; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h3>白金汽油即時報價</h3>
    <p>官方牌價: <span id="officialPrice">讀取中...</span></p>
    
    <label>紅卡折扣 ($/L):</label>
    <input type="number" id="redDiscount" value="6.00" step="0.1">
    
    <label>星期日/額外折扣 ($/L):</label>
    <input type="number" id="sundayDiscount" value="1.00" step="0.1">
    
    <button onclick="calculate()">計算最終價格</button>
    
    <h3 id="result">最終價: --</h3>
</div>

<script>
    async function fetchPrice() {
        try {
            const response = await fetch('/api/fuel'); 
            const htmlText = await response.text();
            
            // --- 偵錯區：如果你看不到價格，請打開 F12 Console 看這行內容 ---
            console.log("成功抓取網頁內容，長度:", htmlText.length);
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            // 策略：直接搜尋整頁文字，不要只侷限在 table row (tr)
            const bodyText = doc.body.innerText;
            
            // 這裡調整正則表達式，增加容錯率
            // 尋找「白金汽油」字樣，後面跟著金額
            const match = bodyText.match(/白金汽油[\s\S]{0,50}?([\d]{2}\.[\d]{2})/);
            
            if (match && match[1]) {
                const price = match[1];
                document.getElementById('officialPrice').innerText = `HK$ ${price}`;
                document.getElementById('officialPrice').dataset.price = price;
            } else {
                console.error("無法解析內容。網頁片段:", bodyText.substring(0, 500));
                document.getElementById('officialPrice').innerText = "解析失敗 (格式已變更)";
            }
        } catch (e) {
            document.getElementById('officialPrice').innerText = "讀取失敗";
            console.error("Fetch 錯誤:", e);
        }
    }

    function calculate() {
        const price = parseFloat(document.getElementById('officialPrice').dataset.price);
        const red = parseFloat(document.getElementById('redDiscount').value);
        const sun = parseFloat(document.getElementById('sundayDiscount').value);
        
        if (!isNaN(price)) {
            const final = price - red - sun;
            document.getElementById('result').innerText = `最終價: HK$ ${final.toFixed(2)} / L`;
        } else {
            alert("尚未載入價格，請稍候");
        }
    }

    window.onload = fetchPrice;
</script>
</body>
</html>
