<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caltex | 油價計算機</title>
    <style>
        :root { 
            --caltex-red: #D4001A; 
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --text-sub: #6B7280;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color);
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }
        .card { 
            background: white; padding: 24px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 100%; max-width: 400px;
        }
        h2 { color: var(--text-main); text-align: center; margin: 0 0 20px 0; font-size: 1.5rem; }
        
        .price-box { 
            background: #F9FAFB; padding: 16px; border-radius: 12px; 
            text-align: center; margin-bottom: 20px; border: 1px solid #E5E7EB;
        }
        .update-time { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        
        .toggle-section { margin-bottom: 24px; text-align: center; }
        .toggle-btn { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s;
            background: #E5E7EB; color: #374151;
        }
        .toggle-btn.active { background: var(--caltex-red); color: white; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .select-btn { 
            padding: 16px; border: none; border-radius: 12px; 
            background: #111827; color: white; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease;
        }
        .select-btn:hover { background: var(--caltex-red); transform: translateY(-2px); }
        .select-btn:active { transform: translateY(0); }
        
        .result-box { 
            background: #FFF5F5; padding: 20px; border-radius: 16px; 
            border: 1px solid #FECACA; display: none;
        }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; color: var(--text-main); }
        .final-price { 
            font-size: 2rem; font-weight: 800; color: var(--caltex-red); 
            text-align: center; margin: 15px 0; letter-spacing: -0.5px;
        }
        .unit-price { 
            text-align: center; font-size: 1.1rem; font-weight: 700; color: var(--caltex-red);
            background: white; padding: 10px; border-radius: 8px; border: 1px dashed var(--caltex-red);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Caltex 計算機</h2>
    
    <div class="price-box">
        <div id="official-price" style="font-weight: 700; font-size: 1.1rem;">白金牌價: 讀取中...</div>
        <div id="last-updated" class="update-time">更新時間: --</div>
    </div>

    <div class="toggle-section">
        <button id="coupon-toggle" class="toggle-btn" onclick="toggleCoupon()">優惠券: 已關閉</button>
    </div>

    <div class="btn-group">
        <button class="select-btn" onclick="calculate(350)">門市 $350</button>
        <button class="select-btn" onclick="calculate(700)">門市 $700</button>
    </div>

    <div class="result-box" id="result-area">
        <div class="result-row"><span>紅卡優惠:</span> <span id="r-disc" style="font-weight: 600;">--</span></div>
        <div class="result-row"><span>總入油量:</span> <span id="r-liters" style="font-weight: 600;">--</span></div>
        <div class="result-row"><span>優惠券:</span> <span id="r-coupon" style="font-weight: 600;">--</span></div>
        <div class="final-price" id="final-price">HK$ --</div>
        <div class="unit-price" id="r-unit">實付每公升: --</div>
    </div>
</div>

<script>
    let currentPrice = 33.64; // 設定預設牌價，以防 fetch 失敗
    let hasCoupon = false;

    function toggleCoupon() {
        hasCoupon = !hasCoupon;
        const btn = document.getElementById('coupon-toggle');
        btn.classList.toggle('active', hasCoupon);
        btn.innerText = hasCoupon ? '優惠券: 已開啟' : '優惠券: 已關閉';
    }

    function calculate(total) {
        const coupon = hasCoupon ? (total === 700 ? 100 : 50) : 0;
        const price = currentPrice;
        
        // 計算邏輯
        const totalLiters = total / price;
        const netSpend = total - coupon;
        const discountableLiters = netSpend / price;
        const cardDiscount = discountableLiters * 12;
        const final = netSpend - cardDiscount;
        
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('r-disc').innerText = '-$' + cardDiscount.toFixed(2);
        document.getElementById('r-liters').innerText = totalLiters.toFixed(2) + ' L';
        document.getElementById('r-coupon').innerText = '-$' + coupon.toFixed(0);
        document.getElementById('final-price').innerText = 'HK$ ' + final.toFixed(2);
        document.getElementById('r-unit').innerText = '實付每公升: $' + (final/totalLiters).toFixed(3);
    }

    window.onload = function() {
        fetch('prices.json')
            .then(response => response.json())
            .then(data => {
                currentPrice = data.platinum;
                document.getElementById('official-price').innerText = '白金牌價: HK$ ' + currentPrice;
                document.getElementById('last-updated').innerText = '最後更新: ' + data.last_updated;
            })
            .catch(err => {
                console.log("未能讀取 JSON，使用預設價格: " + currentPrice);
                document.getElementById('official-price').innerText = '白金牌價: HK$ ' + currentPrice + ' (使用預設)';
                document.getElementById('last-updated').innerText = '更新時間: 讀取失敗';
            });
    };
</script>

</body>
</html>
