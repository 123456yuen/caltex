<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加德士紅卡計算器</title>
  <style>
    body {font-family: -apple-system, sans-serif; margin:0; padding:20px; background:#f4f4f4;}
    .container {max-width:700px; margin:auto; background:white; padding:25px; border-radius:20px; box-shadow:0 8px 30px rgba(0,0,0,0.1);}
    h1 {text-align:center; color:#c8102e;}
    .status {text-align:center; padding:12px; margin:15px 0; border-radius:12px; background:#e8f5e9; color:#2e7d32;}
    label {display:block; margin:15px 0 5px; font-weight:bold;}
    input, select {width:100%; padding:14px; margin:8px 0; border-radius:12px; border:1px solid #ddd;}
    button {width:100%; padding:16px; margin:8px 0; border:none; border-radius:12px; font-size:1.05rem; font-weight:bold;}
    .btn-calc {background:#c8102e; color:white;}
    .result {margin-top:20px; padding:25px; background:#f0f8ff; border-radius:16px;}
    .highlight {font-size:2.1rem; color:#c8102e; font-weight:bold;}
  </style>
</head>
<body>
<div class="container">
  <h1>🚗 加德士紅卡計算器</h1>
  <div class="status" id="status">正在自動更新油價...</div>

  <label>入油量 (公升)</label>
  <input type="number" id="litres" value="50" step="1" oninput="calc()">

  <label>卡類型</label>
  <select id="card" onchange="calc()">
    <option value="fun">加FUN咭</option>
    <option value="red" selected>私人能源咭 / 紅卡</option>
  </select>

  <button class="btn-calc" onclick="calc()">正常計算</button>
  <button onclick="calcSunday()">星期日油券 (滿$350減$50)</button>

  <div class="result" id="result"></div>
</div>

<script>
let currentPrice = 33.64;   // 預設值

async function autoUpdate() {
  const status = document.getElementById('status');
  try {
    const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://oil-price.consumer.org.hk/tc/today-discount'));
    const html = await res.text();

    // 加強提取
    let match = html.match(/白金汽油.*?\$?([\d.]+)/i) || 
                html.match(/Platinum.*?\$?([\d.]+)/i);
    
    if (match && parseFloat(match[1]) > 20) {
      currentPrice = parseFloat(match[1]);
      status.innerHTML = `✅ 油價已自動更新 (${new Date().toLocaleTimeString('zh-HK')})`;
    } else {
      status.innerHTML = `⚠️ 更新失敗 • 使用預設價`;
    }
  } catch(e) {
    status.innerHTML = `⚠️ 更新失敗 • 使用預設價`;
  }
  calc();
}

function calc(isSunday = false) {
  const price = currentPrice;
  const litres = parseFloat(document.getElementById('litres').value) || 0;
  const card = document.getElementById('card').value;

  let discount = card === "red" ? 12 : 0.9;
  let total = price * litres;
  let finalPerL = price - discount;

  if (isSunday && total >= 350) {
    total = Math.max(0, total - 50);
    finalPerL = total / litres;
  }

  document.getElementById('result').innerHTML = `
    <h3>${isSunday ? '星期日油券計算' : '計算結果'}</h3>
    <p>白金汽油原價：$${price}</p>
    <p>卡折扣：$${discount} /L</p>
    ${isSunday ? '<p>油券：減 $50</p>' : ''}
    <p class="highlight">折後 $${finalPerL.toFixed(2)} /L</p>
    <p><b>總金額：$${total.toFixed(2)}</b></p>
    <p style="color:green">慳咗 $${(price * litres - total).toFixed(2)}</p>
  `;
}

function calcSunday() {
  calc(true);
}

// 自動更新
window.onload = autoUpdate;
</script>
</body>
</html>
