<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加德士白金汽油計算機</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f4f9; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 12px; background: #e74c3c; color: white; border: none; cursor: pointer; width: 100%; font-size: 16px; border-radius: 4px; }
        button:hover { background: #c0392b; }
        #result { margin-top: 20px; font-size: 1.5em; color: #e74c3c; text-align: center; }
        #updateTime { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>白金汽油計算機</h3>
    <p>官方牌價: <strong id="officialPrice">讀取中...</strong></p>
    
    <label>紅卡折扣 ($/L):</label>
    <input type="number" id="redDiscount" value="6.00" step="0.1">
    
    <label>星期日/額外折扣 ($/L):</label>
    <input type="number" id="sundayDiscount" value="1.00" step="0.1">
    
    <button onclick="calculate()">計算最終價格</button>
    
    <div id="result">最終價: --</div>
    <div id="updateTime"></div>
</div>

<script>
    async function fetchPrice() {
        try {
            // 直接讀取自動化方案生成的數據檔
            const response = await fetch('/prices.json'); 
            const data = await response.json();
            
            document.getElementById('officialPrice').innerText = `HK$ ${data.platinum}`;
            document.getElementById('officialPrice').dataset.price = data.platinum;
            document.getElementById('updateTime').innerText = `最後更新: ${data.last_updated}`;
        } catch (e) {
            document.getElementById('officialPrice').innerText = "讀取失敗";
        }
    }

    function calculate() {
        const pStr = document.getElementById('officialPrice').dataset.price;
        if (!pStr) return alert("資料載入中，請稍候");
        
        const price = parseFloat(pStr);
        const red = parseFloat(document.getElementById('redDiscount').value);
        const sun = parseFloat(document.getElementById('sundayDiscount').value);
        const final = price - red - sun;
        document.getElementById('result').innerText = `最終價: HK$ ${final.toFixed(2)} / L`;
    }

    // 頁面載入時自動執行
    window.onload = fetchPrice;
</script>
</body>
</html>
