    button {width:100%; padding:16px; margin:10px 0; border:none; border-radius:12px; font-size:1.05rem; font-weight:bold;}
    .btn-update {background:#007bff; color:white;}
    .btn-calc {background:#c8102e; color:white;}
    .result {margin-top:20px; padding:20px; background:#f0f8ff; border-radius:16px;}
    .highlight {font-size:2rem; color:#c8102e; font-weight:bold;}

</div>
