name: Auto Update Fuel Price
on:
  schedule:
    # 這是 UTC 的 17:00 (HK 01:00) 和 UTC 的 05:00 (HK 13:00)
    - cron: '0 17,5 * * *'
  workflow_dispatch: # 方便你隨時手動按 "Run workflow" 測試

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # 這行會自動讀取 package.json 並安裝 puppeteer
      - name: Install dependencies
        run: npm install
        
      - run: node scraper.js
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add prices.json
          git commit -m "Auto-update fuel price" || exit 0
          git push
