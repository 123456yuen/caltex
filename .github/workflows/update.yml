name: Auto Update Fuel Price
on:
  schedule:
    - cron: '0 17 * * *'  # 這是 UTC 的 17:00，等於香港的 01:00
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # 這行會自動讀取 package.json 並安裝 puppeteer
      - name: Install dependencies
        run: npm install
        
      - run: node scraper.js
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add prices.json
          git commit -m "Auto-update fuel price" || exit 0
          git push
